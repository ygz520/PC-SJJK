<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比地数据接口服务 - 企业数据API开放平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            box-sizing: border-box;
        }
        
        body {
            background-color: #f5f7fa;
            min-width: 1920px;
            overflow-x: auto;
        }
        
        /* 页头样式 */
        .header {
            background: #fff;
            height: 70px;
            border-bottom: 1px solid #e8e8e8;
        }
        
        .header-content {
            width: 1200px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        
        .logo-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .logo-img {
            height: 36px;
            width: auto;
        }
        
        .divider {
            width: 1px;
            height: 30px;
            background: #e8e8e8;
        }
        
        .page-title {
            font-size: 18px;
            color: #333;
            font-weight: 500;
        }
        
        /* 顶部搜索框 */
        .header-search {
            display: flex;
            align-items: center;
            background: #f5f7fa;
            border: 1px solid #e8e8e8;
            border-radius: 6px;
            padding: 2px;
            width: 320px;
        }
        
        .header-search-input {
            flex: 1;
            border: none;
            padding: 10px 14px;
            font-size: 14px;
            outline: none;
            background: transparent;
        }
        
        .header-search-input::placeholder {
            color: #999;
        }
        
        .header-search-btn {
            background: #1890ff;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .header-search-btn:hover {
            background: #40a9ff;
        }
        
        .header-nav {
            display: flex;
            align-items: center;
            gap: 32px;
        }
        
        .nav-btn {
            font-size: 15px;
            color: #666;
            text-decoration: none;
            transition: color 0.3s;
            padding: 4px 0;
        }
        
        .nav-btn:hover {
            color: #1890ff;
        }
        
        .nav-btn.active {
            color: #1890ff;
            font-weight: 500;
            border-bottom: 2px solid #1890ff;
            padding-bottom: 4px;
        }
        
        .hotline {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .hotline-icon {
            width: 36px;
            height: 36px;
            background: #e6f7ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1890ff;
        }
        
        .hotline-text {
            text-align: right;
        }
        
        .hotline-label {
            font-size: 12px;
            color: #999;
        }
        
        .hotline-number {
            font-size: 18px;
            color: #1890ff;
            font-weight: 600;
        }
        
        /* 主内容区 */
        .main-content {
            width: 1200px;
            margin: 0 auto;
            padding: 24px 0 60px;
            display: flex;
            gap: 24px;
        }
        
        /* 左侧目录 */
        .category-sidebar {
            width: 260px;
            flex-shrink: 0;
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e8e8e8;
            overflow: hidden;
        }
        
        .sidebar-header {
            padding: 16px 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e8e8e8;
        }
        
        .sidebar-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .sidebar-count {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
        }
        
        .category-list {
            overflow-y: visible;
        }
        
        .category-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 20px;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 1px solid #f5f5f5;
        }
        
        .category-item:last-child {
            border-bottom: none;
        }
        
        .category-item:hover {
            background: #f8fafc;
        }
        
        .category-item.active {
            background: #e6f7ff;
            border-left: 3px solid #1890ff;
        }
        
        .category-icon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        
        .category-info {
            flex: 1;
        }
        
        .category-name {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }
        
        .category-item.active .category-name {
            color: #1890ff;
        }
        
        .category-num {
            font-size: 12px;
            color: #999;
        }
        
        /* 右侧内容 */
        .content-area {
            flex: 1;
            min-width: 0;
        }
        
        /* 接口列表 */
        .api-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .api-card {
            background: #fff;
            border-radius: 8px;
            padding: 24px;
            border: 1px solid #e8e8e8;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .api-card:hover {
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border-color: #1890ff;
        }
        
        .api-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        
        .api-title-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .api-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        
        .api-name {
            font-size: 17px;
            font-weight: 600;
            color: #333;
        }
        
        .api-tags {
            display: flex;
            gap: 8px;
        }
        
        .api-tag {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .tag-method {
            background: #f6ffed;
            color: #52c41a;
        }
        
        .api-desc {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        
        .api-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 16px;
            border-top: 1px solid #f0f0f0;
        }
        
        .api-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
        }
        
        .api-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #666;
        }
        
        .api-meta-item i {
            color: #999;
            font-size: 12px;
        }
        
        .api-meta-item span {
            background: #f5f5f5;
            padding: 4px 10px;
            border-radius: 4px;
            color: #666;
        }
        
        .api-meta-item .meta-label {
            background: transparent;
            padding: 0;
            color: #999;
        }
        
        .api-actions {
            display: flex;
            gap: 12px;
        }
        
        .btn-detail {
            padding: 8px 20px;
            border: 1px solid #d9d9d9;
            background: #fff;
            border-radius: 4px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-detail:hover {
            border-color: #1890ff;
            color: #1890ff;
        }
        
        .btn-apply {
            padding: 8px 20px;
            border: none;
            background: #1890ff;
            border-radius: 4px;
            font-size: 14px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-apply:hover {
            background: #40a9ff;
        }
        
        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 40px;
        }
        
        .pagination button {
            padding: 8px 16px;
            border: 1px solid #e8e8e8;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .pagination button:hover:not(:disabled) {
            border-color: #1890ff;
            color: #1890ff;
        }
        
        .pagination button.active {
            background: #1890ff;
            color: #fff;
            border-color: #1890ff;
        }
        
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 弹窗样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal-content {
            background: #fff;
            border-radius: 12px;
            width: 800px;
            max-height: 85vh;
            overflow-y: auto;
            animation: modalSlideIn 0.3s ease;
        }
        
        @keyframes modalSlideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .modal-body {
            padding: 24px;
        }
        
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #e8e8e8;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        
        .tabs {
            display: flex;
            border-bottom: 1px solid #e8e8e8;
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 12px 24px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
            font-size: 14px;
            color: #666;
        }
        
        .tab:hover {
            color: #1890ff;
        }
        
        .tab.active {
            color: #1890ff;
            border-bottom-color: #1890ff;
            font-weight: 500;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .code-block {
            background: #1e293b;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 8px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            overflow-x: auto;
            line-height: 1.6;
        }
        
        .param-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .param-table th,
        .param-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #e8e8e8;
        }
        
        .param-table th {
            background: #f8fafc;
            font-weight: 600;
            color: #475569;
            font-size: 13px;
        }
        
        .param-table td {
            font-size: 14px;
            color: #334155;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .info-item {
            background: #f8fafc;
            padding: 16px;
            border-radius: 8px;
        }
        
        .info-label {
            font-size: 13px;
            color: #999;
            margin-bottom: 4px;
        }
        
        .info-value {
            font-size: 15px;
            color: #333;
            font-weight: 500;
        }
        
        /* 表单样式 */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
        }
        
        .form-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e8e8e8;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #1890ff;
            box-shadow: 0 0 0 3px rgba(24, 144, 255, 0.1);
        }
        
        /* 申请弹窗特殊样式 */
        .apply-modal-content {
            width: 480px;
        }
        
        .apply-notice {
            background: #e6f7ff;
            border: 1px solid #91d5ff;
            border-radius: 6px;
            padding: 12px 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .apply-notice i {
            color: #1890ff;
            font-size: 16px;
        }
        
        .apply-notice span {
            color: #333;
            font-size: 14px;
        }
        
        .apply-notice strong {
            color: #1890ff;
        }
        
        .apply-footer {
            border-top: 1px solid #f0f0f0;
            padding-top: 20px;
            margin-top: 20px;
            text-align: center;
        }
        
        .apply-footer i {
            color: #1890ff;
            margin-right: 6px;
        }
        
        .apply-footer span {
            color: #666;
            font-size: 14px;
        }
        
        .apply-footer strong {
            color: #1890ff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <!-- 页头 -->
    <header class="header">
        <div class="header-content">
            <div class="header-left">
                <div class="logo-section">
                    <div class="logo">
                        <img src="LOGO.jpg" alt="比地招标" class="logo-img">
                    </div>
                    <div class="divider"></div>
                    <div class="page-title">比地数据接口服务</div>
                </div>
                <!-- 顶部搜索框 -->
                <div class="header-search">
                    <input type="text" class="header-search-input" id="searchInput" placeholder="搜索接口名称、ID或关键词...">
                    <button class="header-search-btn" onclick="searchAPI()">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </div>
            <div class="header-nav">
                <a href="api-platform-intro-v2.html" class="nav-btn">首页</a>
                <a href="api-platform-v7.html" class="nav-btn active">全部数据接口</a>
            </div>
            <div class="hotline">
                <div class="hotline-icon">
                    <i class="fas fa-phone-alt"></i>
                </div>
                <div class="hotline-text">
                    <div class="hotline-label">免费咨询热线</div>
                    <div class="hotline-number">400-999-4928</div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 左侧目录 -->
        <aside class="category-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">接口目录</div>
                <div class="sidebar-count">共 12 个分类，79 个接口</div>
            </div>
            <div class="category-list" id="categoryList">
                <!-- 分类列表将通过JS动态生成 -->
            </div>
        </aside>

        <!-- 右侧内容 -->
        <div class="content-area">
            <!-- 接口列表 -->
            <div class="api-list" id="apiList">
                <!-- 接口列表将通过JS动态生成 -->
            </div>

            <!-- 分页 -->
            <div class="pagination" id="pagination">
                <!-- 分页将通过JS动态生成 -->
            </div>
        </div>
    </main>

    <!-- 接口详情弹窗 -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center">
                        <i class="fas fa-info-circle text-blue-600"></i>
                    </div>
                    <div>
                        <h3 class="text-lg font-semibold text-slate-800" id="modalTitle">接口详情</h3>
                        <p class="text-sm text-slate-500" id="modalSubtitle">接口ID: IC-001</p>
                    </div>
                </div>
                <button class="text-slate-400 hover:text-slate-600" onclick="closeModal('detailModal')">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="tabs">
                    <div class="tab active">接口信息</div>
                </div>

                <div id="apiInfo" class="tab-content active">
                    <div class="info-grid" style="grid-template-columns: repeat(3, 1fr);">
                        <div class="info-item" style="background: transparent; padding: 0;">
                            <p class="info-label">所属分类</p>
                            <p class="info-value" id="detailCategory">工商信息</p>
                        </div>
                        <div class="info-item" style="background: transparent; padding: 0;">
                            <p class="info-label">请求方式</p>
                            <p class="info-value" id="detailMethod">GET</p>
                        </div>
                        <div class="info-item" style="background: transparent; padding: 0;">
                            <p class="info-label">接口ID</p>
                            <p class="info-value" id="detailId">IC-001</p>
                        </div>
                    </div>
                    <div class="mb-4">
                        <p class="text-sm text-slate-500 mb-2">接口描述</p>
                        <p class="text-slate-700" id="detailDesc">查询企业工商登记基本信息...</p>
                    </div>
                    <div class="mb-4">
                        <p class="text-sm text-slate-500 mb-2">接口地址</p>
                        <div class="code-block" id="detailUrl">https://api.bidizhaobiao.com/v1/company/base</div>
                    </div>
                </div>

            </div>
            <div class="modal-footer">
                <button class="btn-detail" onclick="closeModal('detailModal')">关闭</button>
                <button class="btn-apply" onclick="openApplyModal(currentApiName)">申请接口</button>
            </div>
        </div>
    </div>

    <!-- 申请弹窗 -->
    <div class="modal-overlay" id="applyModal">
        <div class="modal-content apply-modal-content">
            <div class="modal-header">
                <h3 class="text-lg font-semibold text-slate-800">申请接口</h3>
                <button class="text-slate-400 hover:text-slate-600" onclick="closeModal('applyModal')">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="modal-body">
                <!-- 申请提示 -->
                <div class="apply-notice">
                    <i class="fas fa-info-circle"></i>
                    <span>您正在申请 <strong id="applyApiName">企业工商基本信息查询</strong> 接口</span>
                </div>
                
                <form id="applyForm">
                    <div class="form-group">
                        <label class="form-label">联系人 <span class="text-red-500">*</span></label>
                        <input type="text" class="form-input" id="contactName" placeholder="请输入联系人姓名" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">联系电话 <span class="text-red-500">*</span></label>
                        <input type="tel" class="form-input" id="contactPhone" placeholder="请输入联系电话" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">公司名称</label>
                        <input type="text" class="form-input" id="companyName" placeholder="请输入公司名称（选填）">
                    </div>
                </form>
                
                <!-- 客服电话 -->
                <div class="apply-footer">
                    <i class="fas fa-phone-alt"></i>
                    <span>官方客服电话：<strong>400-999-4928</strong></span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-detail" onclick="closeModal('applyModal')">取消</button>
                <button class="btn-apply" onclick="submitApply()">提交申请</button>
            </div>
        </div>
    </div>

    <script>
        // API分类数据
        const categories = [
            { id: 'all', name: '全部接口', icon: 'fa-th-large', color: '#1890ff', count: 79 },
            { id: 'gongshang', name: '工商信息', icon: 'fa-building', color: '#2563eb', count: 15 },
            { id: 'sifa', name: '司法风险', icon: 'fa-gavel', color: '#dc2626', count: 10 },
            { id: 'zhishi', name: '知识产权', icon: 'fa-lightbulb', color: '#9333ea', count: 5 },
            { id: 'jingying', name: '经营信息', icon: 'fa-chart-line', color: '#16a34a', count: 8 },
            { id: 'zhaotoubiao', name: '招投标', icon: 'fa-handshake', color: '#0891b2', count: 5 },
            { id: 'jingyingfengxian', name: '经营风险', icon: 'fa-exclamation-triangle', color: '#ea580c', count: 5 },
            { id: 'qiyefazhan', name: '企业发展', icon: 'fa-rocket', color: '#4f46e5', count: 5 },
            { id: 'shangshigongsi', name: '上市公司', icon: 'fa-chart-bar', color: '#db2777', count: 5 },
            { id: 'jianzhushichang', name: '建筑市场', icon: 'fa-hard-hat', color: '#ca8a04', count: 13 },
            { id: 'xinyongzhongguo', name: '信用中国', icon: 'fa-certificate', color: '#0d9488', count: 2 },
            { id: 'teshuzhuti', name: '特殊主体', icon: 'fa-users-cog', color: '#64748b', count: 4 },
            { id: 'tongyong', name: '通用接口', icon: 'fa-cogs', color: '#6b7280', count: 2 }
        ];

        // API接口数据

                { id: 'SP-004', name: '香港企业信息查询', desc: '查询在大陆登记的香港企业基本信息，包括企业名称、注册地、注册资本及法定代表人。', method: 'GET', path: '/v1/special/hongkong-company' }
            ],
            'tongyong': [
                { id: 'COMM-001', name: '企业名称模糊搜索', desc: '根据关键词模糊搜索企业名称，返回匹配的企业列表，适用于前端自动补全及企业检索场景。', method: 'GET', path: '/v1/common/search', hot: true },
                { id: 'COMM-002', name: '企业年报查询（比地）', desc: '查询企业工商年报综合信息（来源：比地数据），包括企业基本信息、资产状况、社保信息及对外投资。', method: 'GET', path: '/v1/common/annual-report' }
            ]
        };

        // 当前选中的分类
        let currentCategory = 'all';
        let currentPage = 1;
        const pageSize = 10;
        let searchKeyword = '';
        let currentApiName = '';

        // 获取URL参数
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderCategoryList();
            
            // 检查是否有搜索参数
            const urlSearchKeyword = getUrlParam('search');
            if (urlSearchKeyword) {
                searchKeyword = decodeURIComponent(urlSearchKeyword);
                document.getElementById('searchInput').value = searchKeyword;
                renderAPIList();
            } else {
                renderAPIList();
            }
            
            // 搜索框回车事件
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    searchAPI();
                }
            });
        });

        // 渲染左侧分类列表
        function renderCategoryList() {
            const container = document.getElementById('categoryList');
            let html = '';
            
            categories.forEach(cat => {
                const isActive = cat.id === currentCategory ? 'active' : '';
                html += `
                    <div class="category-item ${isActive}" onclick="selectCategory('${cat.id}')">
                        <div class="category-icon" style="background: ${cat.color}15; color: ${cat.color};">
                            <i class="fas ${cat.icon}"></i>
                        </div>
                        <div class="category-info">
                            <div class="category-name">${cat.name}</div>
                            <div class="category-num">${cat.count}个接口</div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // 选择分类
        function selectCategory(categoryId) {
            currentCategory = categoryId;
            currentPage = 1;
            searchKeyword = '';
            document.getElementById('searchInput').value = '';
            renderCategoryList();
            renderAPIList();
        }

        // 搜索接口
        function searchAPI() {
            searchKeyword = document.getElementById('searchInput').value.trim().toLowerCase();
            currentPage = 1;
            renderAPIList();
        }

        // 获取所有接口（用于搜索）
        function getAllAPIs() {
            let allAPIs = [];
            Object.keys(apiData).forEach(categoryId => {
                const category = categories.find(c => c.id === categoryId);
                apiData[categoryId].forEach(api => {
                    allAPIs.push({ ...api, categoryId, categoryName: category ? category.name : '' });
                });
            });
            return allAPIs;
        }

        // 渲染接口列表
        function renderAPIList() {
            const container = document.getElementById('apiList');
            let apis = [];
            
            if (searchKeyword) {
                // 搜索模式
                const allAPIs = getAllAPIs();
                apis = allAPIs.filter(api => 
                    api.name.toLowerCase().includes(searchKeyword) ||
                    api.id.toLowerCase().includes(searchKeyword) ||
                    api.desc.toLowerCase().includes(searchKeyword)
                );
            } else if (currentCategory === 'all') {
                // 全部接口
                apis = getAllAPIs();
            } else {
                // 特定分类
                const category = categories.find(c => c.id === currentCategory);
                apis = (apiData[currentCategory] || []).map(api => ({
                    ...api,
                    categoryId: currentCategory,
                    categoryName: category ? category.name : ''
                }));
            }
            
            // 分页
            const totalPages = Math.ceil(apis.length / pageSize);
            const start = (currentPage - 1) * pageSize;
            const pageData = apis.slice(start, start + pageSize);
            
            // 渲染接口卡片
            let html = '';
            pageData.forEach(api => {
                const methodTag = `<span class="api-tag tag-method">${api.method}</span>`;
                
                html += `
                    <div class="api-card" onclick="showDetail('${api.id}', '${api.categoryId || currentCategory}')">
                        <div class="api-header">
                            <div class="api-title-section">
                                <div class="api-icon" style="background: ${getIconColor(api.categoryId || currentCategory)}20; color: ${getIconColor(api.categoryId || currentCategory)};">
                                    <i class="fas ${getCategoryIcon(api.categoryId || currentCategory)}"></i>
                                </div>
                                <div>
                                    <div class="api-name">${api.name}</div>
                                </div>
                            </div>
                            <div class="api-tags">
                                ${methodTag}
                            </div>
                        </div>
                        <div class="api-desc">${api.desc}</div>
                        <div class="api-footer">
                            <div class="api-meta">
                                <div class="api-meta-item">
                                    <i class="fas fa-hashtag"></i>
                                    <span class="meta-label">接口编号</span>
                                    <span>${api.id}</span>
                                </div>
                                <div class="api-meta-item">
                                    <i class="fas fa-folder"></i>
                                    <span class="meta-label">所属分类</span>
                                    <span>${api.categoryName}</span>
                                </div>
                            </div>
                            <div class="api-actions" onclick="event.stopPropagation()">
                                <button class="btn-detail" onclick="showDetail('${api.id}', '${api.categoryId || currentCategory}')">查看详情</button>
                                <button class="btn-apply" onclick="openApplyModal('${api.name}')">申请接口</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            if (apis.length === 0) {
                html = `
                    <div style="text-align: center; padding: 60px; color: #999;">
                        <i class="fas fa-search" style="font-size: 48px; margin-bottom: 16px; opacity: 0.3;"></i>
                        <p>未找到匹配的接口</p>
                    </div>
                `;
            }
            
            container.innerHTML = html;
            
            // 渲染分页
            renderPagination(totalPages, apis.length);
        }

        // 获取分类图标颜色
        function getIconColor(categoryId) {
            const category = categories.find(c => c.id === categoryId);
            return category ? category.color : '#1890ff';
        }

        // 获取分类图标
        function getCategoryIcon(categoryId) {
            const category = categories.find(c => c.id === categoryId);
            return category ? category.icon : 'fa-plug';
        }

        // 渲染分页
        function renderPagination(totalPages, totalItems) {
            const container = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let html = `
                <button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                    <i class="fas fa-chevron-left"></i>
                </button>
            `;
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    const active = i === currentPage ? 'active' : '';
                    html += `<button class="${active}" onclick="goToPage(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += '<span style="padding: 8px;">...</span>';
                }
            }
            
            html += `
                <button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
                    <i class="fas fa-chevron-right"></i>
                </button>
            `;
            
            container.innerHTML = html;
        }

        // 跳转到指定页
        function goToPage(page) {
            currentPage = page;
            renderAPIList();
        }

        // 显示接口详情
        function showDetail(apiId, categoryId) {
            let api = null;
            let category = null;
            
            if (categoryId && apiData[categoryId]) {
                api = apiData[categoryId].find(a => a.id === apiId);
                category = categories.find(c => c.id === categoryId);
            }
            
            if (!api) {
                // 在所有分类中查找
                for (const [catId, apis] of Object.entries(apiData)) {
                    api = apis.find(a => a.id === apiId);
                    if (api) {
                        category = categories.find(c => c.id === catId);
                        break;
                    }
                }
            }
            
            if (!api) return;
            
            currentApiName = api.name;
            document.getElementById('modalTitle').textContent = api.name;
            document.getElementById('modalSubtitle').textContent = `接口ID: ${api.id}`;
            document.getElementById('detailCategory').textContent = category ? category.name : '-';
            document.getElementById('detailMethod').textContent = api.method;
            document.getElementById('detailId').textContent = api.id;
            document.getElementById('detailDesc').textContent = api.desc;
            document.getElementById('detailUrl').textContent = `https://api.bidizhaobiao.com${api.path}`;
            
            // 重置标签页
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector('.tab').classList.add('active');
            document.getElementById('apiInfo').classList.add('active');
            
            openModal('detailModal');
        }

        // 打开申请弹窗
        function openApplyModal(apiName) {
            document.getElementById('applyApiName').textContent = apiName || '';
            openModal('applyModal');
        }

        // 提交申请
        function submitApply() {
            const form = document.getElementById('applyForm');
            if (form.checkValidity()) {
                const name = document.getElementById('contactName').value.trim();
                const phone = document.getElementById('contactPhone').value.trim();
                const company = document.getElementById('companyName').value.trim();
                
                let successMsg = `申请提交成功！\n\n接口：${currentApiName}\n联系人：${name}\n电话：${phone}`;
                if (company) {
                    successMsg += `\n公司名称：${company}`;
                }
                successMsg += `\n\n我们的客服人员将在24小时内与您联系。`;
                
                alert(successMsg);
                closeModal('applyModal');
                form.reset();
            } else {
                form.reportValidity();
            }
        }

        // 打开弹窗
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        // 关闭弹窗
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
            document.body.style.overflow = '';
        }

        // 切换标签
        function switchTab(tab, contentId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            tab.classList.add('active');
            document.getElementById(contentId).classList.add('active');
        }

        // 点击弹窗外部关闭
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('show');
                    document.body.style.overflow = '';
                }
            });
        });
    </script>
</body>
</html>
